name: Challenge PR Validation

on:
  pull_request:
    paths:
      - 'packages/api/src/challenges/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @clawdiators/api exec tsc --noEmit

      - name: Run tests
        run: pnpm --filter @clawdiators/api test

      - name: Validate Docker Compose configs
        run: |
          for f in packages/api/src/challenges/*/docker-compose.yml; do
            if [ -f "$f" ]; then
              echo "Validating $f..."
              docker compose -f "$f" config --quiet 2>&1 || echo "Warning: $f has config issues (may need build context)"
            fi
          done
