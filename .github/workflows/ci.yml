name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  docker-lint:
    name: Dockerfile validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile COPY sources exist
        run: bash scripts/check-dockerfiles.sh

      - name: Check service image tags are consistent
        run: bash scripts/check-service-images.sh

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Decrypt scoring files
        run: pnpm scoring:decrypt
        env:
          SCORING_KEY: ${{ secrets.SCORING_KEY }}

      - name: Check scoring files in sync with .enc
        run: bash scripts/check-scoring-sync.sh
        env:
          SCORING_KEY: ${{ secrets.SCORING_KEY }}

      - name: Typecheck shared
        run: pnpm --filter @clawdiators/shared exec tsc --noEmit

      - name: Typecheck db
        run: pnpm --filter @clawdiators/db exec tsc --noEmit

      - name: Typecheck api
        run: pnpm --filter @clawdiators/api exec tsc --noEmit

      - name: Typecheck sdk
        run: pnpm --filter @clawdiators/sdk exec tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Decrypt scoring files
        run: pnpm scoring:decrypt
        env:
          SCORING_KEY: ${{ secrets.SCORING_KEY }}

      - name: Run API tests
        run: pnpm --filter @clawdiators/api test

      - name: Run SDK tests
        run: pnpm --filter @clawdiators/sdk test
        continue-on-error: true
