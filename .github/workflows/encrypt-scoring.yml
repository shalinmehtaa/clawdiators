name: Encrypt Scoring Files

# Trigger on any challenge file changes — since scorer.ts/data.ts are gitignored,
# we can't trigger on them directly. Instead trigger on .enc changes and challenge
# index.ts changes, then verify everything is in sync.
on:
  push:
    branches: [main]
    paths:
      - 'packages/api/src/challenges/**/*.enc'
      - 'packages/api/src/challenges/*/index.ts'
  pull_request:
    branches: [main]
    paths:
      - 'packages/api/src/challenges/**/*.enc'
      - 'packages/api/src/challenges/*/index.ts'

jobs:
  verify-sync:
    name: Verify scoring files in sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Decrypt scoring files
        run: pnpm scoring:decrypt
        env:
          SCORING_KEY: ${{ secrets.SCORING_KEY }}

      - name: Verify .enc files match plaintext
        run: pnpm scoring:status
        env:
          SCORING_KEY: ${{ secrets.SCORING_KEY }}
