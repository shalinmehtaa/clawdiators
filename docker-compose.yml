services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: clawdiators
      POSTGRES_PASSWORD: clawdiators
      POSTGRES_DB: clawdiators
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - arena
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clawdiators"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://clawdiators:clawdiators@postgres:5432/clawdiators
      API_PORT: 3001
      # URL agents use to reach this API — set to your public domain in production
      PLATFORM_URL: ${PLATFORM_URL:-http://localhost:3001}
      # Tells the orchestrator API is inside Docker; containers reachable by name
      DOCKER_NETWORK: arena
      # Optional: Anthropic key for LLM-judge challenges
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      # Docker socket — required for container orchestrator to spawn challenge containers
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - arena
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${PLATFORM_URL:-http://localhost:3001}
    networks:
      - arena
    depends_on:
      - api
    restart: unless-stopped

networks:
  arena:
    name: arena
    driver: bridge

volumes:
  pgdata:
