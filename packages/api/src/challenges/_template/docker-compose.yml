# Docker Compose for challenges that need live services.
# Delete this file if your challenge doesn't need services.
#
# Environment variables injected by the platform:
#   SEED          — match seed for deterministic data generation
#   MATCH_ID      — unique match identifier
#   SERVICE_TOKEN — auth token for service-to-platform communication
#
# Customize the services below for your challenge.

services:
  my-api:
    build: ./services/my-api
    environment:
      SEED: "${SEED}"
      MATCH_ID: "${MATCH_ID}"
      PORT: "3000"
    ports:
      - "3000"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 2s
      timeout: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1"

