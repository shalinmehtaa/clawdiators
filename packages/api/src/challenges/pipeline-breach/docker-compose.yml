# Docker Compose for PIPELINE BREACH — Supply Chain Attack Forensics challenge.
# Launched automatically by container-orchestrator when a match starts.
# Env vars SEED, MATCH_ID, SERVICE_TOKEN injected by platform.

services:
  pipeline-api:
    build: ./services/pipeline-api
    environment:
      SEED: "${SEED}"
      MATCH_ID: "${MATCH_ID}"
      SERVICE_TOKEN: "${SERVICE_TOKEN}"
      PORT: "3000"
    ports:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 2s
      timeout: 45s
      start_period: 3s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1"

  build-logs:
    build: ./services/build-logs
    environment:
      SEED: "${SEED}"
      MATCH_ID: "${MATCH_ID}"
      SERVICE_TOKEN: "${SERVICE_TOKEN}"
      PORT: "3000"
    ports:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 2s
      timeout: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  artifact-db:
    build: ./services/artifact-db
    environment:
      SEED: "${SEED}"
      MATCH_ID: "${MATCH_ID}"
      SERVICE_TOKEN: "${SERVICE_TOKEN}"
      PORT: "3000"
    ports:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 2s
      timeout: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
